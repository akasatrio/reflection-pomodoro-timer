<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --beige: #eae8e3; --green: #0c3b2e; --brown: #1f140f; --beige-light: #f5f0eb;
    --surface: rgba(0,0,0,0.025); --border: rgba(31,20,15,0.12);
    --border-light: rgba(31,20,15,0.06); --btn-bg: var(--green); --btn-fg: var(--beige);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding-top: 0.8rem; overflow: hidden;
    transition: background-color 0.8s, color 0.8s;
    background-color: rgba(234,232,227,0.88); color: var(--brown);
  }
  body.work {
    background-color: rgba(12,59,46,0.88); color: var(--beige);
    --surface: rgba(255,255,255,0.05); --border: rgba(234,232,227,0.15);
    --border-light: rgba(234,232,227,0.08); --btn-bg: var(--beige); --btn-fg: var(--green);
  }
  body.break {
    background-color: rgba(245,240,235,0.88); color: var(--green);
    --surface: rgba(12,59,46,0.03); --border: rgba(12,59,46,0.12);
    --border-light: rgba(12,59,46,0.06); --btn-bg: var(--green); --btn-fg: var(--beige-light);
  }
  body.done {
    background-color: rgba(31,20,15,0.88); color: var(--beige);
    --surface: rgba(255,255,255,0.05); --border: rgba(234,232,227,0.15);
    --border-light: rgba(234,232,227,0.08); --btn-bg: var(--beige); --btn-fg: var(--brown);
  }

  .container { text-align:center; padding:0.3rem 1.2rem; width:100%; }

  /* Settings */
  .settings {
    border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light);
    padding: 0.5rem 0; margin-bottom: 1.2rem;
  }
  .section-title {
    font-size:0.48rem; font-weight:700; letter-spacing:0.16em;
    text-transform:uppercase; opacity:0.35; margin-bottom:0.4rem;
  }
  .reset-btn { cursor:pointer; opacity:0.6; font-size:0.6rem; vertical-align:middle; transition:opacity 0.15s; }
  .reset-btn:hover { opacity:1; }
  .settings-grid { display:flex; justify-content:center; gap:0; margin-bottom:0.35rem; }
  .settings-grid:last-of-type { margin-bottom:0.4rem; }
  .setting-field {
    display:flex; flex-direction:column; align-items:center; gap:0.15rem;
    flex:1; padding:0 0.2rem; position:relative;
  }
  .setting-field + .setting-field::before {
    content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
    height:55%; width:1px; background:var(--border-light);
  }
  .setting-field label {
    font-size:0.44rem; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; opacity:0.3;
  }
  .setting-field input[type="number"] {
    width:34px; text-align:center; background:transparent; border:none;
    border-bottom:1px solid var(--border); color:inherit; font-family:inherit;
    font-size:0.78rem; font-weight:500; padding:0.1rem 0; outline:none;
    -moz-appearance:textfield;
  }
  .setting-field input::-webkit-inner-spin-button,
  .setting-field input::-webkit-outer-spin-button { -webkit-appearance:none; }
  .setting-field input:focus { border-bottom-color:currentColor; }

  .objective-row { display:flex; border:1px solid var(--border-light); }
  .objective-row input[type="text"] {
    flex:1; background:transparent; border:none; color:inherit;
    font-family:inherit; font-size:0.64rem; padding:0.35rem 0.5rem; outline:none;
  }
  .objective-row input::placeholder { opacity:0.25; }
  .apply-btn {
    background:var(--surface); border:none; border-left:1px solid var(--border-light);
    color:inherit; font-family:inherit; font-size:0.48rem; font-weight:700;
    letter-spacing:0.12em; text-transform:uppercase; padding:0.35rem 0.6rem;
    cursor:pointer;
  }
  .apply-btn:hover { background:var(--border-light); }

  /* Timer */
  .objective-display {
    font-size:0.5rem; font-weight:600; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.3; margin-bottom:0.8rem; min-height:0.5rem;
  }
  .phase-label {
    font-size:0.9rem; font-weight:700; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.5; margin-bottom:0.5rem; margin-top:-1rem;
  }
  .timer {
    font-family:'M PLUS Rounded 1c', sans-serif; font-size:4rem; font-weight:300; letter-spacing:0.06em;
    line-height:1; margin-bottom:0.6rem; font-variant-numeric:tabular-nums;
  }
  .timer.pulse { animation: pulse 0.6s ease 3; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .warning-label {
    font-size:0.48rem; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; opacity:0; min-height:0.6rem; margin-bottom:0.4rem; transition:opacity 0.5s;
  }
  .warning-label.visible { opacity:0.45; }

  .progress-dots { display:flex; justify-content:center; gap:0.5rem; margin-bottom:1.2rem; }
  .dot {
    width:10px; height:10px; border-radius:50%; background:currentColor; opacity:0.15;
    transition: opacity 0.5s, transform 0.4s;
  }
  .dot.filled { opacity:0.65; transform:scale(1.15); }
  .dot.active { opacity:0.4; animation: dotPulse 1.5s ease infinite; }
  @keyframes dotPulse { 0%,100%{opacity:0.4} 50%{opacity:0.2} }

  /* Controls */
  .controls { display:flex; gap:0; justify-content:center; margin-top:0.8rem; }
  button.primary {
    border:none; padding:0.5rem 1.3rem; font-size:0.58rem; font-weight:700;
    letter-spacing:0.14em; text-transform:uppercase; cursor:pointer;
    font-family:inherit; background:var(--btn-bg); color:var(--btn-fg);
    transition: all 0.3s; position:relative; overflow:hidden;
  }
  button.primary::after {
    content:''; position:absolute; inset:0; background:currentColor; opacity:0; transition:opacity 0.3s;
  }
  button.primary:hover::after { opacity:0.06; }
  button.primary:active { transform:scale(0.98); }
  button.secondary {
    background:transparent; border:1px solid var(--border); padding:0.5rem 0.8rem;
    font-size:0.58rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; font-family:inherit; opacity:0.35; color:inherit;
    transition: all 0.3s; margin-left:-1px;
  }
  button.secondary:hover { opacity:0.6; }

  .toggles-row { display:flex; justify-content:center; gap:0.6rem; margin-top:0.8rem; padding-bottom:0.8rem; }
  .toggles-row button {
    background:none; border:none; color:inherit; font-family:inherit;
    font-size:0.44rem; font-weight:600; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.25; cursor:pointer; padding:0.2rem 0.4rem;
  }
  .toggles-row button:hover { opacity:0.5; }
  .toggles-row button.active { opacity:0.55; }

  /* Reflection */
  .reflection-panel { display:none; margin-top:1rem; animation: fadeIn 0.4s forwards; }
  .reflection-panel.visible { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .reflection-title-input {
    width:100%; background:transparent; border:none;
    border-bottom:1px solid var(--border-light); color:inherit;
    font-family:inherit; font-size:0.68rem; font-weight:600;
    padding:0.3rem 0.1rem; outline:none; margin-bottom:0.3rem;
  }
  .reflection-title-input:focus { border-bottom-color:currentColor; }
  .reflection-title-input::placeholder { opacity:0.2; font-weight:400; }

  .reflection-panel textarea {
    width:100%; min-height:50px; background:var(--surface);
    border:1px solid var(--border-light); color:inherit;
    font-family:inherit; font-size:0.66rem; line-height:1.6;
    padding:0.5rem 0.6rem; outline:none; resize:vertical; margin-bottom:0.4rem;
  }
  .reflection-panel textarea:focus { border-color:currentColor; }
  .reflection-panel textarea::placeholder { opacity:0.2; }

  .notes-actions { display:flex; gap:0; justify-content:center; }
  .notes-status {
    font-size:0.5rem; opacity:0; margin-top:0.3rem; transition:opacity 0.3s; min-height:0.5rem;
  }
  .notes-status.visible { opacity:0.4; }
  .note-saved-badge {
    display:none; font-size:0.44rem; font-weight:600; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.3; margin-top:0.2rem;
  }
  .note-saved-badge.visible { display:block; }

  /* Done / Summary */
  .done-message {
    display:none; font-size:0.8rem; font-weight:300; opacity:0.7;
    line-height:1.7; margin-bottom:0.8rem;
  }
  .done-message.visible { display:block; }
  .session-summary {
    display:none; text-align:left;
    border-top:1px solid var(--border-light); border-bottom:1px solid var(--border-light);
    padding:0.6rem 0; margin-bottom:0.8rem;
  }
  .session-summary.visible { display:block; }
  .session-summary .summary-item {
    font-size:0.62rem; line-height:1.5; padding:0.4rem 0;
    border-bottom:1px solid var(--border-light); opacity:0.65;
  }
  .session-summary .summary-item:last-child { border-bottom:none; }
  .session-summary .summary-item strong {
    font-weight:600; opacity:1; font-size:0.54rem;
    letter-spacing:0.06em; text-transform:uppercase;
  }
  .cycle-header {
    font-size:0.44rem; font-weight:700; letter-spacing:0.14em;
    text-transform:uppercase; opacity:0.35; margin-top:0.5rem; margin-bottom:0.2rem;
  }
  .cycle-header:first-child { margin-top:0; }

  body.done { overflow-y: auto; }
  body.done::-webkit-scrollbar { display:none; }

  /* Compact mode — hide settings, objective, reflection during active session */
  body.compact .settings { display:none; }
  body.compact .objective-display { display:none; }
  body.compact .reflection-panel { display:none !important; }
  body.compact .done-message { display:none; }
  body.compact .session-summary { display:none; }
  body.compact .container { padding-bottom:1.2rem; }

  /* Mini mode — only phase label + timer */
  body.mini .settings { display:none; }
  body.mini .objective-display { display:none; }
  body.mini .reflection-panel { display:none !important; }
  body.mini .done-message { display:none; }
  body.mini .session-summary { display:none; }
  body.mini .progress-dots { display:none; }
  body.mini .warning-label { display:none; }
  body.mini .controls { display:none; }
  body.mini .toggles-row { display:none; }
  body.mini .signature { display:none; }
  body.mini .drag-bar { height:0.6rem; }
  body.mini .window-controls { top:-0.2rem; }
  body.mini .container { padding:0 0.8rem 0.3rem; }
  body.mini .phase-label { margin-top:0.8rem; margin-bottom:0.1rem; font-size:0.5rem; }
  body.mini .timer { margin-bottom:0; font-size:2.2rem; }

  /* Mini mode button — only visible during active work session */
  button.mini-btn { display:none !important; font-size:0.45rem; }
  body.compact button.mini-btn { display:flex !important; }
  body.mini button.mini-btn { display:flex !important; }

  /* Reflection mode — more bottom breathing room */
  .reflection-panel.visible ~ .controls { margin-bottom:0.6rem; }

  /* Drag region + window controls */
  .drag-bar { height:1.6rem; width:100%; position:relative; }
  .app-bar-icon {
    position:absolute; left:0.1rem; top:50%; transform:translateY(-50%);
    width:14px; height:14px; opacity:0.35; pointer-events:none;
  }
  .app-bar-icon svg { width:100%; height:100%; fill:currentColor; }
  body.mini .app-bar-icon { display:none; }
  .window-controls { display:flex; justify-content:flex-end; gap:0.2rem; position:absolute; right:0; top:0; }
  .win-btn { background:none; border:none; cursor:pointer; font-size:1rem; line-height:1; width:1.5rem; height:1.5rem; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--green); opacity:0.5; transition:opacity 0.15s, background 0.15s, color 0.15s; padding:0; font-family:'M PLUS Rounded 1c',sans-serif; position:relative; z-index:100; }
  .win-btn:hover { opacity:0.8; background:var(--surface); }
  .close-btn:hover { opacity:0.9; color:#c0392b; }
  .win-btn { color:#fff !important; }
  .close-btn:hover { color:#ff6b6b !important; }

  /* Update banner */
  .update-banner {
    display:none; padding:0.35rem 0.6rem; margin-bottom:0.6rem;
    background:var(--surface); border:1px solid var(--border-light);
    font-size:0.5rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
    cursor:pointer; transition:all 0.3s; opacity:0.7;
  }
  .update-banner:hover { opacity:1; background:var(--border-light); }
  .update-banner.visible { display:block; }
  .update-banner.updating { pointer-events:none; opacity:0.4; }
  body.compact .update-banner, body.mini .update-banner { display:none !important; }

  /* Funny sounds upload panel */
  .funny-sounds-panel { display:none; margin-top:0.4rem; padding:0.5rem 0; border-top:1px solid var(--border-light); }
  .funny-sounds-panel.visible { display:block; }
  .sound-slot { display:flex; align-items:center; gap:0.3rem; padding:0.2rem 0; font-size:0.5rem; }
  .sound-slot-label { flex:1; text-align:left; font-weight:600; letter-spacing:0.06em; opacity:0.5; font-size:0.44rem; text-transform:uppercase; }
  .sound-slot-name { font-size:0.44rem; opacity:0.35; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sound-slot button {
    background:none; border:1px solid var(--border-light); color:inherit; font-family:inherit;
    font-size:0.42rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
    padding:0.15rem 0.35rem; cursor:pointer; opacity:0.4; transition:opacity 0.15s;
  }
  .sound-slot button:hover { opacity:0.7; }
  .sound-error { font-size:0.42rem; color:#c0392b; opacity:0.7; margin-top:0.15rem; }
  body.compact .funny-sounds-panel, body.mini .funny-sounds-panel { display:none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="drag-bar">
    <span class="app-bar-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="13" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="12" y1="13" x2="12" y2="8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="13" x2="15.5" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="10" y1="2" x2="14" y2="2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
    <div class="window-controls">
      <button class="win-btn mini-btn" onclick="toggleMiniMode()" title="Mini mode">&#x2022;</button>
      <button class="win-btn minimize-btn" onclick="hideToMenuBar()" title="Minimize to menu bar">&#x2013;</button>
      <button class="win-btn close-btn" onclick="closeApp()" title="Close">&times;</button>
    </div>
  </div>
  <!-- Update banner -->
  <div class="update-banner" id="updateBanner" onclick="applyUpdate()">
    &#x2191; Update available (<span id="updateVersion"></span>) — Restart to update
  </div>
  <!-- Settings -->
  <div class="settings" id="settingsPanel">
    <div class="section-title">Session <span class="reset-btn" onclick="resetSettings()" title="Reset to defaults">&#x21bb;</span></div>
    <div class="settings-grid">
      <div class="setting-field"><label>Work</label><input type="number" id="inputWork" value="25" min="1" max="90"></div>
      <div class="setting-field"><label>Break</label><input type="number" id="inputShort" value="5" min="1" max="30"></div>
      <div class="setting-field"><label>Long</label><input type="number" id="inputLong" value="15" min="0" max="60"></div>
    </div>
    <div class="settings-grid">
      <div class="setting-field"><label>Sessions</label><input type="number" id="inputSession" value="4" min="1" max="20"></div>
      <div class="setting-field"><label>Long @</label><input type="number" id="inputLongEvery" value="4" min="1" max="20"></div>
      <div class="setting-field"><label>Cycles</label><input type="number" id="inputCycles" value="1" min="1" max="10"></div>
    </div>
    <div class="objective-row">
      <input type="text" id="inputObjective" placeholder="What are you working on?" onkeydown="if(event.key==='Enter')applySettings()">
      <button class="apply-btn" onclick="applySettings()">Apply</button>
    </div>
  </div>

  <!-- Timer -->
  <div class="objective-display" id="objectiveDisplay"></div>
  <div class="phase-label" id="phaseLabel">Ready</div>
  <div class="timer" id="timerDisplay">25:00</div>
  <div class="warning-label" id="warningLabel"></div>
  <div class="progress-dots" id="progressDots"></div>

  <!-- Reflection -->
  <div class="reflection-panel" id="reflectionPanel">
    <div class="section-title">Reflect — what did you accomplish?</div>
    <input type="text" id="reflectionTitle" class="reflection-title-input" placeholder="Note title…">
    <textarea id="reflectionText" placeholder="Write a quick note…"></textarea>
    <div class="notes-actions">
      <button class="primary" onclick="submitReflection()">Save</button>
      <button class="secondary" onclick="copyCurrentNote()">Copy</button>
    </div>
    <div class="notes-status" id="notesStatus"></div>
    <div class="note-saved-badge" id="noteSavedBadge">Note saved</div>
  </div>

  <!-- Done -->
  <div class="done-message" id="doneMsg">Session complete. Well done.</div>
  <div class="session-summary" id="sessionSummary">
    <div class="section-title">Session Summary</div>
    <div id="summaryContent"></div>
  </div>

  <div class="controls" id="controls">
    <button class="primary" onclick="toggleStart()">Start</button>
    <button class="secondary" onclick="resetBlock()">Reset</button>
    <button class="secondary" onclick="skipPhase()">Skip</button>
  </div>
  <div class="toggles-row">
    <button onclick="toggleMute()" id="muteBtn">Sound On</button>
    <button onclick="toggleFunnyMode()" id="funnyBtn">Funny Mode</button>
  </div>
  <div class="funny-sounds-panel" id="funnySoundsPanel">
    <div class="section-title">Funny Mode Sounds</div>
    <div class="sound-slot" data-slot="sessionStart">
      <span class="sound-slot-label">Session Start</span>
      <span class="sound-slot-name" id="soundName_sessionStart"></span>
      <button onclick="previewSound('sessionStart')" id="soundPlay_sessionStart" style="display:none">&#9654;</button>
      <button onclick="removeSound('sessionStart')" id="soundRemove_sessionStart" style="display:none">&times;</button>
      <button onclick="document.getElementById('soundFile_sessionStart').click()" id="soundUpload_sessionStart">Upload</button>
      <input type="file" id="soundFile_sessionStart" accept=".mp3,.wav,.m4a,.ogg,audio/*" style="display:none" onchange="handleSoundUpload('sessionStart',this)">
    </div>
    <div class="sound-slot" data-slot="twoMinReminder">
      <span class="sound-slot-label">2-Min Reminder</span>
      <span class="sound-slot-name" id="soundName_twoMinReminder"></span>
      <button onclick="previewSound('twoMinReminder')" id="soundPlay_twoMinReminder" style="display:none">&#9654;</button>
      <button onclick="removeSound('twoMinReminder')" id="soundRemove_twoMinReminder" style="display:none">&times;</button>
      <button onclick="document.getElementById('soundFile_twoMinReminder').click()" id="soundUpload_twoMinReminder">Upload</button>
      <input type="file" id="soundFile_twoMinReminder" accept=".mp3,.wav,.m4a,.ogg,audio/*" style="display:none" onchange="handleSoundUpload('twoMinReminder',this)">
    </div>
    <div class="sound-slot" data-slot="sessionEnd">
      <span class="sound-slot-label">Session End</span>
      <span class="sound-slot-name" id="soundName_sessionEnd"></span>
      <button onclick="previewSound('sessionEnd')" id="soundPlay_sessionEnd" style="display:none">&#9654;</button>
      <button onclick="removeSound('sessionEnd')" id="soundRemove_sessionEnd" style="display:none">&times;</button>
      <button onclick="document.getElementById('soundFile_sessionEnd').click()" id="soundUpload_sessionEnd">Upload</button>
      <input type="file" id="soundFile_sessionEnd" accept=".mp3,.wav,.m4a,.ogg,audio/*" style="display:none" onchange="handleSoundUpload('sessionEnd',this)">
    </div>
    <div class="sound-slot" data-slot="cycleEnd">
      <span class="sound-slot-label">Cycle End</span>
      <span class="sound-slot-name" id="soundName_cycleEnd"></span>
      <button onclick="previewSound('cycleEnd')" id="soundPlay_cycleEnd" style="display:none">&#9654;</button>
      <button onclick="removeSound('cycleEnd')" id="soundRemove_cycleEnd" style="display:none">&times;</button>
      <button onclick="document.getElementById('soundFile_cycleEnd').click()" id="soundUpload_cycleEnd">Upload</button>
      <input type="file" id="soundFile_cycleEnd" accept=".mp3,.wav,.m4a,.ogg,audio/*" style="display:none" onchange="handleSoundUpload('cycleEnd',this)">
    </div>
  </div>
  <div style="font-size:0.55rem;opacity:0.35;padding:0.8rem 0 0.3rem;font-family:'M PLUS Rounded 1c',sans-serif;">&copy; Baradhio with Claude Code</div>
</div>

<script>
  let SESSION=4, LONG_EVERY=4, CYCLES=1, WORK=25*60, SHORT=5*60, LONG=15*60;
  let phase='idle', timeLeft=WORK, running=false, interval=null, count=0, currentCycle=0;
  let allNotes=[], currentCycleNotes=[], warningShown=false, reflectionShown=false, noteSubmittedThisPomodoro=false;
  let muted=false, funnyMode=false;

  // Bridge to Swift panel control
  function panelMsg(action,extra){
    var msg={action:action};if(extra)Object.keys(extra).forEach(function(k){msg[k]=extra[k];});
    try{window.webkit.messageHandlers.panelControl.postMessage(msg);}catch(e){}
  }
  let miniMode=false;
  function enterCompact(){document.body.classList.add('compact');document.body.classList.remove('mini');miniMode=false;panelMsg('sessionStart');}
  function expandFull(){document.body.classList.remove('compact');document.body.classList.remove('mini');miniMode=false;panelMsg('sessionExpand');}
  function exitCompact(){document.body.classList.remove('compact');document.body.classList.remove('mini');miniMode=false;panelMsg(funnyMode?'funnySoundsShow':'sessionStop');}
  function enterMini(){miniMode=true;document.body.classList.remove('compact');document.body.classList.add('mini');panelMsg('sessionMini');}

  // Audio
  let audioCtx=null;
  function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
  function bellStrike(n,delay){
    if(muted)return; delay=delay||0;
    try{const ctx=getAudioCtx();for(let i=0;i<n;i++){const t=ctx.currentTime+delay+i*0.28;
      var o1=ctx.createOscillator(),g1=ctx.createGain();o1.type='sine';o1.frequency.setValueAtTime(820,t);
      o1.frequency.exponentialRampToValueAtTime(780,t+0.5);g1.gain.setValueAtTime(0.28,t);
      g1.gain.exponentialRampToValueAtTime(0.001,t+0.7);o1.connect(g1);g1.connect(ctx.destination);o1.start(t);o1.stop(t+0.7);
      var o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='sine';o2.frequency.setValueAtTime(1640,t);
      o2.frequency.exponentialRampToValueAtTime(1560,t+0.4);g2.gain.setValueAtTime(0.1,t);
      g2.gain.exponentialRampToValueAtTime(0.001,t+0.5);o2.connect(g2);g2.connect(ctx.destination);o2.start(t);o2.stop(t+0.5);
      var o3=ctx.createOscillator(),g3=ctx.createGain();o3.type='sine';o3.frequency.setValueAtTime(3280,t);
      g3.gain.setValueAtTime(0.035,t);g3.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o3.connect(g3);g3.connect(ctx.destination);o3.start(t);o3.stop(t+0.3);
    }}catch(e){}
  }
  function celebrationBells(){if(!playCustomSound('cycleEnd')){bellStrike(3,0);bellStrike(2,1.0);bellStrike(1,1.8);}}

  let funnyAudio=null;
  function playGameBoySound(){
    if(muted)return;
    try{if(funnyAudio)funnyAudio.pause();funnyAudio=new Audio('sound effect/nintendo-game-boy-startup.mp3');funnyAudio.play().catch(function(){bellStrike(1,0);});}catch(e){bellStrike(1,0);}
  }
  // IndexedDB for custom funny mode sounds
  var MAX_SOUND_SIZE=5*1024*1024;
  var customSoundCache={sessionStart:null,twoMinReminder:null,sessionEnd:null,cycleEnd:null};
  var previewAudio=null;
  function openSoundDB(){
    return new Promise(function(resolve,reject){
      var req=indexedDB.open('PomodoroSounds',1);
      req.onupgradeneeded=function(e){e.target.result.createObjectStore('customSounds',{keyPath:'slot'});};
      req.onsuccess=function(e){resolve(e.target.result);};
      req.onerror=function(){reject(req.error);};
    });
  }
  function saveCustomSound(slot,file){
    return openSoundDB().then(function(db){
      return new Promise(function(resolve,reject){
        var tx=db.transaction('customSounds','readwrite');
        tx.objectStore('customSounds').put({slot:slot,fileName:file.name,mimeType:file.type,blob:file});
        tx.oncomplete=function(){resolve();};tx.onerror=function(){reject(tx.error);};
      });
    });
  }
  function removeCustomSoundDB(slot){
    return openSoundDB().then(function(db){
      return new Promise(function(resolve,reject){
        var tx=db.transaction('customSounds','readwrite');
        tx.objectStore('customSounds').delete(slot);
        tx.oncomplete=function(){resolve();};tx.onerror=function(){reject(tx.error);};
      });
    });
  }
  function loadAllCustomSounds(){
    return openSoundDB().then(function(db){
      return new Promise(function(resolve,reject){
        var tx=db.transaction('customSounds','readonly');
        var req=tx.objectStore('customSounds').getAll();
        req.onsuccess=function(){
          (req.result||[]).forEach(function(entry){
            if(customSoundCache[entry.slot]&&customSoundCache[entry.slot].objectURL)URL.revokeObjectURL(customSoundCache[entry.slot].objectURL);
            customSoundCache[entry.slot]={fileName:entry.fileName,objectURL:URL.createObjectURL(entry.blob)};
          });
          resolve();
        };
        req.onerror=function(){resolve();};
      });
    }).catch(function(){});
  }
  function playCustomSound(slot){
    if(muted)return false;
    if(!funnyMode||!customSoundCache[slot])return false;
    try{
      if(previewAudio)previewAudio.pause();
      previewAudio=new Audio(customSoundCache[slot].objectURL);
      previewAudio.play().catch(function(){});
      return true;
    }catch(e){return false;}
  }

  function playWarningSound(){if(muted)return;if(!playCustomSound('twoMinReminder'))playGameBoySound();}

  function loadSettings(){try{var s=JSON.parse(localStorage.getItem('pomodoro_settings'));if(!s)return;WORK=s.work||25*60;SHORT=s.short||5*60;LONG=(typeof s.long==='number')?s.long:15*60;SESSION=s.session||s.total||4;LONG_EVERY=s.longEvery||4;CYCLES=s.cycles||1;SESSION=Math.max(1,Math.min(20,SESSION));CYCLES=Math.max(1,Math.min(10,CYCLES));document.getElementById('inputWork').value=Math.round(WORK/60);document.getElementById('inputShort').value=Math.round(SHORT/60);document.getElementById('inputLong').value=Math.round(LONG/60);document.getElementById('inputSession').value=SESSION;document.getElementById('inputLongEvery').value=LONG_EVERY;document.getElementById('inputCycles').value=CYCLES;timeLeft=WORK;display.textContent=fmt(WORK);}catch(e){}}

  function toggleStart(){

  function showReflectionPanel(){

  function noteMatches(n){return n.cycle===currentCycle&&n.session===count+1;}
  function submitReflection(){
    var title=reflectionTitle.value.trim(),text=reflectionText.value.trim();
    if(!text&&!title){showNoteStatus('Write something first');return;}
    if(noteSubmittedThisPomodoro){
      for(var i=currentCycleNotes.length-1;i>=0;i--){if(noteMatches(currentCycleNotes[i])){currentCycleNotes[i].title=title;currentCycleNotes[i].text=text;currentCycleNotes[i].time=formatTime();break;}}
      showNoteStatus('Note updated');
    }else{
      currentCycleNotes.push({session:count+1,cycle:currentCycle,title:title,text:text,time:formatTime()});
      noteSubmittedThisPomodoro=true;showNoteStatus('Note saved');
    }
    noteSavedBadge.classList.add('visible');
  }
  function autoSaveReflection(){
    var title=reflectionTitle.value.trim(),text=reflectionText.value.trim();
    if((text||title)&&!noteSubmittedThisPomodoro){
      currentCycleNotes.push({session:count+1,cycle:currentCycle,title:title,text:text,time:formatTime()});noteSubmittedThisPomodoro=true;
    }else if((text||title)&&noteSubmittedThisPomodoro){
      for(var i=currentCycleNotes.length-1;i>=0;i--){if(noteMatches(currentCycleNotes[i])){currentCycleNotes[i].title=title;currentCycleNotes[i].text=text;currentCycleNotes[i].time=formatTime();break;}}
    }
  }
  function tick(){

    }
    if(timeLeft>0)return;clearInterval(interval);running=false;
    if(phase==='work'){
      autoSaveReflection();reflectionPanel.classList.remove('visible');
      warningLabel.classList.remove('visible');warningLabel.textContent='';
      count++;updateDots();playSessionEndSound();
      notify('Session '+count+' of '+SESSION+(CYCLES>1?' (cycle '+(currentCycle+1)+')':'')+' done');
      advanceAfterWork();

  function showCycleBreak(){

  function escapeHtml(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}

  function generateSingleMarkdown(n){var h=n.title||('Session '+n.session);return'## '+h+' — '+formatDate()+' '+n.time+'\n**Objective:** '+getObjective()+'\n\n'+n.text+'\n';}
  function generateAllMarkdown(){

    var flat=[];allNotes.forEach(function(cy){flat=flat.concat(cy);});
    if(CYCLES>1){allNotes.forEach(function(cycleNotes,idx){md+='## Cycle '+(idx+1)+'\n\n';cycleNotes.forEach(function(n){var h=n.title||('Session '+n.session);md+='### '+h+' ('+n.time+')\n'+n.text+'\n\n';});});}
    else{flat.forEach(function(n){var h=n.title||('Session '+n.session);md+='### '+h+' ('+n.time+')\n'+n.text+'\n\n';});}

  function generateCycleMarkdown(){

  function copyCurrentNote(){

  function showNoteStatus(m){notesStatus.textContent=m;notesStatus.classList.add('visible');setTimeout(function(){notesStatus.classList.remove('visible');},2500);}

  function toggleMute(){muted=!muted;document.getElementById('muteBtn').textContent=muted?'Sound Off':'Sound On';try{localStorage.setItem('pomodoro_muted',muted?'1':'0');}catch(e){}}

  function handleSoundUpload(slot,input){
    var file=input.files&&input.files[0];if(!file)return;
    input.value='';
    if(file.size>MAX_SOUND_SIZE){showSoundError(slot,'Max 5 MB');return;}
    if(!file.type.match(/^audio\//)){showSoundError(slot,'Audio files only');return;}
    saveCustomSound(slot,file).then(function(){
      if(customSoundCache[slot]&&customSoundCache[slot].objectURL)URL.revokeObjectURL(customSoundCache[slot].objectURL);
      customSoundCache[slot]={fileName:file.name,objectURL:URL.createObjectURL(file)};
      renderFunnySoundsPanel();
    }).catch(function(){showSoundError(slot,'Save failed');});
  }
  function previewSound(slot){
    if(!customSoundCache[slot])return;
    try{if(previewAudio)previewAudio.pause();previewAudio=new Audio(customSoundCache[slot].objectURL);previewAudio.play().catch(function(){});}catch(e){}
  }
  function removeSound(slot){
    removeCustomSoundDB(slot).then(function(){
      if(customSoundCache[slot]&&customSoundCache[slot].objectURL)URL.revokeObjectURL(customSoundCache[slot].objectURL);
      customSoundCache[slot]=null;
      renderFunnySoundsPanel();
    }).catch(function(){});
  }
  function showSoundError(slot,msg){
    var row=document.querySelector('[data-slot="'+slot+'"]');
    var existing=row.querySelector('.sound-error');if(existing)existing.remove();
    var el=document.createElement('span');el.className='sound-error';el.textContent=msg;row.appendChild(el);
    setTimeout(function(){el.remove();},3000);
  }

  document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.code==='Space'){e.preventDefault();toggleStart();}else if(e.key==='r'||e.key==='R')resetBlock();else if(e.key==='s'||e.key==='S')skipPhase();});

  // Update checker
  var APP_VERSION='0.3.6';
  var GITHUB_REPO='akasatrio/reflection-pomodoro-timer';
  function compareVersions(a,b){
    var pa=a.replace(/^v/,'').split('.').map(Number),pb=b.replace(/^v/,'').split('.').map(Number);
    for(var i=0;i<3;i++){if((pa[i]||0)>(pb[i]||0))return 1;if((pa[i]||0)<(pb[i]||0))return -1;}return 0;
  }
  function checkForUpdate(){
    fetch('https://api.github.com/repos/'+GITHUB_REPO+'/releases/latest')
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.tag_name&&compareVersions(data.tag_name,APP_VERSION)>0){
          var banner=document.getElementById('updateBanner');
          document.getElementById('updateVersion').textContent=data.tag_name;
          banner.classList.add('visible');
        }
      }).catch(function(){});
  }
  function applyUpdate(){
    var banner=document.getElementById('updateBanner');
    banner.classList.add('updating');
    banner.textContent='Downloading and building update\u2026';
    panelMsg('updateApp');
  }
  function updateFailed(msg){
    var banner=document.getElementById('updateBanner');
    banner.classList.remove('updating');
    banner.innerHTML='Update failed — click to retry';
    banner.onclick=function(){checkForUpdate();applyUpdate();};
    setTimeout(function(){
      banner.innerHTML='&#x2191; Update available (<span id="updateVersion"></span>) — Restart to update';
      banner.onclick=function(){applyUpdate();};
      checkForUpdate();
    },5000);
  }
  checkForUpdate();
  setInterval(checkForUpdate,30*60*1000);

  loadSettings();loadMute();loadFunnyMode();buildDots();display.textContent=fmt(WORK);updateTitle();
  loadAllCustomSounds().then(function(){renderFunnySoundsPanel();});
</script>
</body>
</html>
