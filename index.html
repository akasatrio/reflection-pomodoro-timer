<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflection Pomodoro Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --beige: #eae8e3; --green: #0c3b2e; --brown: #1f140f; --beige-light: #f5f0eb;
    --surface: rgba(0,0,0,0.025); --border: rgba(31,20,15,0.12);
    --border-light: rgba(31,20,15,0.06); --btn-bg: var(--green); --btn-fg: var(--beige);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { height: 100%; }
  body {
    font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 0.8rem; padding-bottom: 0; overflow: hidden;
    transition: background-color 0.8s, color 0.8s;
    background-color: rgba(234,232,227,0.88); color: var(--brown);
  }
  body.work {
    background-color: rgba(12,59,46,0.88); color: var(--beige);
    --surface: rgba(255,255,255,0.05); --border: rgba(234,232,227,0.15);
    --border-light: rgba(234,232,227,0.08); --btn-bg: var(--beige); --btn-fg: var(--green);
  }
  body.break {
    background-color: rgba(245,240,235,0.88); color: var(--green);
    --surface: rgba(12,59,46,0.03); --border: rgba(12,59,46,0.12);
    --border-light: rgba(12,59,46,0.06); --btn-bg: var(--green); --btn-fg: var(--beige-light);
  }
  body.done {
    background-color: rgba(31,20,15,0.88); color: var(--beige);
    --surface: rgba(255,255,255,0.05); --border: rgba(234,232,227,0.15);
    --border-light: rgba(234,232,227,0.08); --btn-bg: var(--beige); --btn-fg: var(--brown);
  }

  .container { text-align:center; padding:0.3rem 1.2rem 0; width:100%; }

  /* Settings */
  .settings {
    border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light);
    padding: 0.5rem 0; margin-bottom: 1.2rem;
  }
  .section-title {
    font-size:0.48rem; font-weight:700; letter-spacing:0.16em;
    text-transform:uppercase; opacity:0.35; margin-bottom:0.4rem;
  }
  .reset-btn { cursor:pointer; opacity:0.6; font-size:0.6rem; vertical-align:middle; transition:opacity 0.15s; }
  .reset-btn:hover { opacity:1; }
  .settings-grid { display:flex; justify-content:center; gap:0; margin-bottom:0.35rem; }
  .settings-grid:last-of-type { margin-bottom:0.4rem; }
  .setting-field {
    display:flex; flex-direction:column; align-items:center; gap:0.15rem;
    flex:1; padding:0 0.2rem; position:relative;
  }
  .setting-field + .setting-field::before {
    content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
    height:55%; width:1px; background:var(--border-light);
  }
  .setting-field label {
    font-size:0.44rem; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; opacity:0.3;
  }
  .setting-field input[type="number"] {
    width:34px; text-align:center; background:transparent; border:none;
    border-bottom:1px solid var(--border); color:inherit; font-family:inherit;
    font-size:0.78rem; font-weight:500; padding:0.1rem 0; outline:none;
    -moz-appearance:textfield;
  }
  .setting-field input::-webkit-inner-spin-button,
  .setting-field input::-webkit-outer-spin-button { -webkit-appearance:none; }
  .setting-field input:focus { border-bottom-color:currentColor; }

  .objective-row { display:flex; border:1px solid var(--border-light); }
  .objective-row input[type="text"] {
    flex:1; background:transparent; border:none; color:inherit;
    font-family:inherit; font-size:0.64rem; padding:0.35rem 0.5rem; outline:none;
  }
  .objective-row input::placeholder { opacity:0.25; }
  .apply-btn {
    background:var(--surface); border:none; border-left:1px solid var(--border-light);
    color:inherit; font-family:inherit; font-size:0.48rem; font-weight:700;
    letter-spacing:0.12em; text-transform:uppercase; padding:0.35rem 0.6rem;
    cursor:pointer;
  }
  .apply-btn:hover { background:var(--border-light); }

  /* Timer */
  .objective-display {
    font-size:0.5rem; font-weight:600; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.3; margin-bottom:0.8rem; min-height:0.5rem;
  }
  .phase-label {
    font-size:0.9rem; font-weight:700; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.5; margin-bottom:0.5rem; margin-top:-1rem;
  }
  .timer {
    font-family:'M PLUS Rounded 1c', sans-serif; font-size:4rem; font-weight:300; letter-spacing:0.06em;
    line-height:1; margin-bottom:0.6rem; font-variant-numeric:tabular-nums;
  }
  .timer.pulse { animation: pulse 0.6s ease 3; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .warning-label {
    font-size:0.48rem; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; opacity:0; min-height:0.6rem; margin-bottom:0.4rem; transition:opacity 0.5s;
  }
  .warning-label.visible { opacity:0.45; }

  .progress-dots { display:flex; justify-content:center; gap:0.5rem; margin-bottom:1.2rem; }
  .dot {
    width:10px; height:10px; border-radius:50%; background:currentColor; opacity:0.15;
    transition: opacity 0.5s, transform 0.4s;
  }
  .dot.filled { opacity:0.65; transform:scale(1.15); }
  .dot.active { opacity:0.4; animation: dotPulse 1.5s ease infinite; }
  @keyframes dotPulse { 0%,100%{opacity:0.4} 50%{opacity:0.2} }

  /* Controls */
  .controls { display:flex; gap:0; justify-content:center; margin-top:0.8rem; }
  button.primary {
    border:none; padding:0.5rem 1.3rem; font-size:0.58rem; font-weight:700;
    letter-spacing:0.14em; text-transform:uppercase; cursor:pointer;
    font-family:inherit; background:var(--btn-bg); color:var(--btn-fg);
    transition: all 0.3s; position:relative; overflow:hidden;
  }
  button.primary::after {
    content:''; position:absolute; inset:0; background:currentColor; opacity:0; transition:opacity 0.3s;
  }
  button.primary:hover::after { opacity:0.06; }
  button.primary:active { transform:scale(0.98); }
  button.secondary {
    background:transparent; border:1px solid var(--border); padding:0.5rem 0.8rem;
    font-size:0.58rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; font-family:inherit; opacity:0.35; color:inherit;
    transition: all 0.3s; margin-left:-1px;
  }
  button.secondary:hover { opacity:0.6; }

  .toggles-row { display:flex; justify-content:center; gap:0.6rem; margin-top:0.65rem; padding-bottom:0.2rem; }
  .signature {
    font-size:0.55rem; opacity:0.35; margin-top:0.85rem; margin-bottom:0;
    padding:0.12rem 0 0; font-family:'M PLUS Rounded 1c',sans-serif;
    line-height:1.55;
  }
  .toggles-row button {
    background:none; border:none; color:inherit; font-family:inherit;
    font-size:0.44rem; font-weight:600; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.25; cursor:pointer; padding:0.2rem 0.4rem;
  }
  .toggles-row button:hover { opacity:0.5; }
  .toggles-row button.active { opacity:0.55; }

  /* Reflection */
  .reflection-panel { display:none; margin-top:1rem; animation: fadeIn 0.4s forwards; }
  .reflection-panel.visible { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .reflection-title-input {
    width:100%; background:transparent; border:none;
    border-bottom:1px solid var(--border-light); color:inherit;
    font-family:inherit; font-size:0.68rem; font-weight:600;
    padding:0.3rem 0.1rem; outline:none; margin-bottom:0.3rem;
  }
  .reflection-title-input:focus { border-bottom-color:currentColor; }
  .reflection-title-input::placeholder { opacity:0.2; font-weight:400; }

  .reflection-panel textarea {
    width:100%; min-height:50px; background:var(--surface);
    border:1px solid var(--border-light); color:inherit;
    font-family:inherit; font-size:0.66rem; line-height:1.6;
    padding:0.5rem 0.6rem; outline:none; resize:vertical; margin-bottom:0.4rem;
  }
  .reflection-panel textarea:focus { border-color:currentColor; }
  .reflection-panel textarea::placeholder { opacity:0.2; }

  .notes-actions { display:flex; gap:0; justify-content:center; }
  .notes-status {
    font-size:0.5rem; opacity:0; margin-top:0.3rem; transition:opacity 0.3s; min-height:0.5rem;
  }
  .notes-status.visible { opacity:0.4; }
  .note-saved-badge {
    display:none; font-size:0.44rem; font-weight:600; letter-spacing:0.12em;
    text-transform:uppercase; opacity:0.3; margin-top:0.2rem;
  }
  .note-saved-badge.visible { display:block; }

  /* Done / Summary */
  .done-message {
    display:none; font-size:0.8rem; font-weight:300; opacity:0.7;
    line-height:1.7; margin-bottom:0.8rem;
  }
  .done-message.visible { display:block; }
  .session-summary {
    display:none; text-align:left;
    border-top:1px solid var(--border-light); border-bottom:1px solid var(--border-light);
    padding:0.6rem 0; margin-bottom:0.8rem;
  }
  .session-summary.visible { display:block; }
  .session-summary .summary-item {
    font-size:0.62rem; line-height:1.5; padding:0.4rem 0;
    border-bottom:1px solid var(--border-light); opacity:0.65;
  }
  .session-summary .summary-item:last-child { border-bottom:none; }
  .session-summary .summary-item strong {
    font-weight:600; opacity:1; font-size:0.54rem;
    letter-spacing:0.06em; text-transform:uppercase;
  }
  .summary-scroll {
    max-height:min(58vh, 420px);
    overflow-y:auto;
    margin-top:0.35rem;
    padding-right:0.2rem;
    -webkit-overflow-scrolling:touch;
  }
  .summary-scroll::-webkit-scrollbar { width:6px; }
  .summary-scroll::-webkit-scrollbar-thumb {
    background:var(--border); border-radius:3px;
  }

  body.done { overflow-y: auto; }
  body.done::-webkit-scrollbar { width:6px; }
  body.done::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:3px; }
  body.done .container { padding-bottom:0.15rem; }

  /* Compact mode — hide settings, objective, reflection during active session */
  body.compact {
    min-height: 100%;
    flex-direction: column;
    align-items: stretch;
  }
  body.compact .settings { display:none; }
  body.compact .objective-display { display:none; }
  body.compact .reflection-panel { display:none !important; }
  body.compact .done-message { display:none; }
  body.compact .session-summary { display:none; }
  body.compact .container {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding-bottom: 0.06rem;
  }
  body.compact .signature {
    margin-top: auto;
    padding-top: 0.5rem;
    padding-bottom: 0;
  }

  /* Mini mode — only phase label + timer */
  body.mini .settings { display:none; }
  body.mini .objective-display { display:none; }
  body.mini .reflection-panel { display:none !important; }
  body.mini .done-message { display:none; }
  body.mini .session-summary { display:none; }
  body.mini .progress-dots { display:none; }
  body.mini .warning-label { display:none; }
  body.mini .controls { display:none; }
  body.mini .toggles-row { display:none; }
  body.mini .signature { display:none; }
  body.mini .drag-bar { height:0.6rem; }
  body.mini .window-controls { top:-0.2rem; }
  body.mini .container { padding:0 0.8rem 0.3rem; }
  body.mini .phase-label { margin-top:0.8rem; margin-bottom:0.1rem; font-size:0.5rem; }
  body.mini .timer { margin-bottom:0; font-size:2.2rem; }

  /* Mini mode button — only visible during active work session */
  button.mini-btn { display:none !important; font-size:0.45rem; }
  body.compact button.mini-btn { display:flex !important; }
  body.mini button.mini-btn { display:flex !important; }

  /* Reflection mode — more bottom breathing room */
  .reflection-panel.visible ~ .controls { margin-bottom:0.6rem; }

  /* Drag region + window controls */
  .drag-bar { height:1.6rem; width:100%; position:relative; }
  .app-bar-title {
    position:absolute; left:0; top:50%; transform:translateY(-50%);
    font-size:0.56rem; font-weight:600; letter-spacing:0.04em;
    opacity:0.42; pointer-events:none;
    padding-left:0.1rem; max-width:calc(100% - 5.2rem);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  body.work .app-bar-title { opacity:0.38; }
  body.break .app-bar-title { opacity:0.35; }
  body.done .app-bar-title { opacity:0.4; }
  body.mini .app-bar-title { display:none; }
  .window-controls { display:flex; justify-content:flex-end; gap:0.2rem; position:absolute; right:0; top:0; }
  .win-btn { background:none; border:none; cursor:pointer; font-size:1rem; line-height:1; width:1.5rem; height:1.5rem; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--green); opacity:0.5; transition:opacity 0.15s, background 0.15s, color 0.15s; padding:0; font-family:'M PLUS Rounded 1c',sans-serif; position:relative; z-index:100; }
  .win-btn:hover { opacity:0.8; background:var(--surface); }
  .close-btn:hover { opacity:0.9; color:#c0392b; }
  .win-btn { color:#fff !important; }
  .close-btn:hover { color:#ff6b6b !important; }

  /* Update banner */
  .update-banner {
    display:none; padding:0.35rem 0.6rem; margin-bottom:0.6rem;
    background:var(--surface); border:1px solid var(--border-light);
    font-size:0.5rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
    cursor:pointer; transition:all 0.3s; opacity:0.7;
  }
  .update-banner:hover { opacity:1; background:var(--border-light); }
  .update-banner.visible { display:block; }
  .update-banner.updating { pointer-events:none; opacity:0.4; }
  body.compact .update-banner, body.mini .update-banner { display:none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="drag-bar">
    <span class="app-bar-title">RefPom Timer</span>
    <div class="window-controls">
      <button class="win-btn mini-btn" onclick="toggleMiniMode()" title="Mini mode">&#x2022;</button>
      <button class="win-btn minimize-btn" onclick="hideToMenuBar()" title="Minimize to menu bar">&#x2013;</button>
      <button class="win-btn close-btn" onclick="closeApp()" title="Close">&times;</button>
    </div>
  </div>
  <!-- Update banner -->
  <div class="update-banner" id="updateBanner" onclick="applyUpdate()">
    &#x2191; Update available (<span id="updateVersion"></span>) — Restart to update
  </div>
  <!-- Settings -->
  <div class="settings" id="settingsPanel">
    <div class="section-title">Session <span class="reset-btn" onclick="resetSettings()" title="Reset to defaults">&#x21bb;</span></div>
    <div class="settings-grid">
      <div class="setting-field"><label>Work</label><input type="number" id="inputWork" value="25" min="1" max="90"></div>
      <div class="setting-field"><label>Break</label><input type="number" id="inputShort" value="5" min="1" max="30"></div>
      <div class="setting-field"><label>Long</label><input type="number" id="inputLong" value="15" min="0" max="60"></div>
    </div>
    <div class="settings-grid">
      <div class="setting-field"><label>Sessions</label><input type="number" id="inputSessionSize" value="4" min="1" max="20" title="Work blocks per cycle"></div>
      <div class="setting-field"><label>Long @</label><input type="number" id="inputLongEvery" value="4" min="1" max="20" title="Long break after every N sessions in a cycle"></div>
      <div class="setting-field"><label>Cycles</label><input type="number" id="inputCycles" value="2" min="1" max="20" title="How many full session rounds"></div>
    </div>
    <div class="objective-row">
      <input type="text" id="inputObjective" placeholder="What are you working on?" onkeydown="if(event.key==='Enter')applySettings()">
      <button class="apply-btn" onclick="applySettings()">Apply</button>
    </div>
  </div>

  <!-- Timer -->
  <div class="objective-display" id="objectiveDisplay"></div>
  <div class="phase-label" id="phaseLabel">Ready</div>
  <div class="timer" id="timerDisplay">25:00</div>
  <div class="warning-label" id="warningLabel"></div>
  <div class="progress-dots" id="progressDots"></div>

  <!-- Reflection -->
  <div class="reflection-panel" id="reflectionPanel">
    <div class="section-title">Reflect — what did you accomplish?</div>
    <input type="text" id="reflectionTitle" class="reflection-title-input" placeholder="Note title…">
    <textarea id="reflectionText" placeholder="Write a quick note…"></textarea>
    <div class="notes-actions">
      <button class="primary" onclick="submitReflection()">Save</button>
      <button class="secondary" onclick="copyCurrentNote()">Copy</button>
    </div>
    <div class="notes-status" id="notesStatus"></div>
    <div class="note-saved-badge" id="noteSavedBadge">Note saved</div>
  </div>

  <!-- Done -->
  <div class="done-message" id="doneMsg">Session complete. Well done.</div>
  <div class="session-summary" id="sessionSummary">
    <div class="section-title" id="summarySectionTitle">Session Summary</div>
    <div class="summary-scroll" id="summaryScroll">
      <div id="summaryContent"></div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="primary" onclick="toggleStart()">Start</button>
    <button class="secondary" onclick="resetBlock()">Reset</button>
    <button class="secondary" onclick="skipPhase()">Skip</button>
  </div>
  <div class="toggles-row">
    <button onclick="toggleMute()" id="muteBtn">Sound On</button>
    <button onclick="toggleFunnyMode()" id="funnyBtn">Funny Mode</button>
  </div>
  <div class="signature">&copy; Baradhio with Claude Code</div>
</div>

<script>
  let SESSION_SIZE=4, CYCLES=2, LONG_EVERY=4, WORK=25*60, SHORT=5*60, LONG=15*60;
  let phase='idle', timeLeft=WORK, running=false, interval=null, count=0, cycleIndex=0;
  let sessionNotes=[], warningShown=false, reflectionShown=false, noteSubmittedThisPomodoro=false;
  let muted=false, funnyMode=false;

  // Bridge to Swift panel control
  function panelMsg(action,extra){
    var msg={action:action};if(extra)Object.keys(extra).forEach(function(k){msg[k]=extra[k];});
    try{window.webkit.messageHandlers.panelControl.postMessage(msg);}catch(e){}
  }
  let miniMode=false;
  function enterCompact(){document.body.classList.add('compact');document.body.classList.remove('mini');miniMode=false;panelMsg('sessionStart');}
  function expandFull(){document.body.classList.remove('compact');document.body.classList.remove('mini');miniMode=false;panelMsg('sessionExpand');}
  function exitCompact(){document.body.classList.remove('compact');document.body.classList.remove('mini');miniMode=false;panelMsg('sessionStop');}
  function enterMini(){miniMode=true;document.body.classList.remove('compact');document.body.classList.add('mini');panelMsg('sessionMini');}
  function exitMini(){miniMode=false;document.body.classList.remove('mini');document.body.classList.add('compact');panelMsg('sessionStart');}
  function toggleMiniMode(){if(miniMode)exitMini();else enterMini();}
  function hideToMenuBar(){panelMsg('panelHide');}
  function closeApp(){panelMsg('panelClose');}

  const display=document.getElementById('timerDisplay'),
    pLabel=document.getElementById('phaseLabel'),
    doneMsg=document.getElementById('doneMsg'),
    controls=document.getElementById('controls'),
    objDisp=document.getElementById('objectiveDisplay'),
    reflectionPanel=document.getElementById('reflectionPanel'),
    reflectionTitle=document.getElementById('reflectionTitle'),
    reflectionText=document.getElementById('reflectionText'),
    notesStatus=document.getElementById('notesStatus'),
    noteSavedBadge=document.getElementById('noteSavedBadge'),
    warningLabel=document.getElementById('warningLabel'),
    summaryEl=document.getElementById('sessionSummary'),
    summarySectionTitle=document.getElementById('summarySectionTitle'),
    summaryScroll=document.getElementById('summaryScroll'),
    summaryContent=document.getElementById('summaryContent'),
    settingsPanel=document.getElementById('settingsPanel'),
    progressDots=document.getElementById('progressDots');

  // Audio
  let audioCtx=null;
  function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
  function bellStrike(n,delay){
    if(muted)return; delay=delay||0;
    try{const ctx=getAudioCtx();for(let i=0;i<n;i++){const t=ctx.currentTime+delay+i*0.28;
      var o1=ctx.createOscillator(),g1=ctx.createGain();o1.type='sine';o1.frequency.setValueAtTime(820,t);
      o1.frequency.exponentialRampToValueAtTime(780,t+0.5);g1.gain.setValueAtTime(0.28,t);
      g1.gain.exponentialRampToValueAtTime(0.001,t+0.7);o1.connect(g1);g1.connect(ctx.destination);o1.start(t);o1.stop(t+0.7);
      var o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='sine';o2.frequency.setValueAtTime(1640,t);
      o2.frequency.exponentialRampToValueAtTime(1560,t+0.4);g2.gain.setValueAtTime(0.1,t);
      g2.gain.exponentialRampToValueAtTime(0.001,t+0.5);o2.connect(g2);g2.connect(ctx.destination);o2.start(t);o2.stop(t+0.5);
      var o3=ctx.createOscillator(),g3=ctx.createGain();o3.type='sine';o3.frequency.setValueAtTime(3280,t);
      g3.gain.setValueAtTime(0.035,t);g3.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o3.connect(g3);g3.connect(ctx.destination);o3.start(t);o3.stop(t+0.3);
    }}catch(e){}
  }
  function celebrationBells(){bellStrike(3,0);bellStrike(2,1.0);bellStrike(1,1.8);}

  let funnyAudio=null;
  function playGameBoySound(){
    if(muted)return;
    try{if(funnyAudio)funnyAudio.pause();funnyAudio=new Audio('sound effect/nintendo-game-boy-startup.mp3');funnyAudio.play().catch(function(){bellStrike(1,0);});}catch(e){bellStrike(1,0);}
  }
  function playFunnySound(){
    if(muted||!funnyMode)return;
    // TODO: dedicated funny mode sound later
    playGameBoySound();
  }
  function playWarningSound(){if(muted)return;playGameBoySound();}
  function playSessionEndSound(){if(muted)return;playGameBoySound();}
  function playTransitionSound(){if(muted)return;playGameBoySound();}

  function requestNotifications(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}
  function notify(t,b){if('Notification'in window&&Notification.permission==='granted')new Notification(t,{body:b,silent:true});}

  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  function formatDate(){var d=new Date(),m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();}
  function formatTime(){var d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

  function buildDots(){progressDots.innerHTML='';for(var i=0;i<SESSION_SIZE;i++){var d=document.createElement('div');d.className='dot';d.id='d'+i;if(i<count)d.classList.add('filled');else if(i===count&&phase==='work')d.classList.add('active');progressDots.appendChild(d);}}
  function updateDots(){for(var i=0;i<SESSION_SIZE;i++){var d=document.getElementById('d'+i);if(d){d.classList.toggle('filled',i<count);d.classList.toggle('active',i===count&&(phase==='work'||phase==='shortBreak'||phase==='longBreak'||phase==='cycleBreak'));}}}
  function updateTitle(){document.title=(phase==='idle'||phase==='done')?'Pomodoro Timer':fmt(timeLeft)+' — Pomodoro';}
  function interCycleDuration(){return LONG>0?LONG:SHORT;}
  function notifyWorkBlockDone(){
    notify('Pomodoro Complete','Session '+ (count)+' of '+SESSION_SIZE+' — cycle '+(cycleIndex+1)+' of '+CYCLES);
  }
  function noteKeyMatches(n){return n.cycle===cycleIndex&&n.workIndex===count+1;}
  function renderSummaryHtml(notes){
    var html='';
    notes.forEach(function(n){
      var h=n.title||('Session '+n.workIndex);
      html+='<div class="summary-item"><strong>'+escapeHtml(h)+'</strong> ('+n.time+')<br>'+escapeHtml(n.text)+'</div>';
    });
    summaryContent.innerHTML=html;
  }
  function documentContentHeight(){
    var de=document.documentElement, b=document.body;
    return Math.max(
      de.scrollHeight||0, b.scrollHeight||0,
      de.offsetHeight||0, b.offsetHeight||0
    );
  }
  function requestPanelFitDone(){
    requestAnimationFrame(function(){
      var h=documentContentHeight();
      panelMsg('sessionDone',{height:h});
      requestAnimationFrame(function(){
        var h2=documentContentHeight();
        if(h2>h)panelMsg('sessionDone',{height:h2});
      });
    });
  }

  function applySettings(){
    if(running)return;exitCompact();
    var w=parseInt(document.getElementById('inputWork').value)||25,
      s=parseInt(document.getElementById('inputShort').value)||5,
      l=parseInt(document.getElementById('inputLong').value);
    if(isNaN(l))l=15;
    var ss=parseInt(document.getElementById('inputSessionSize').value)||4,
      cy=parseInt(document.getElementById('inputCycles').value)||2,
      le=parseInt(document.getElementById('inputLongEvery').value)||4,
      obj=document.getElementById('inputObjective').value.trim();
    WORK=w*60;SHORT=s*60;LONG=l*60;
    SESSION_SIZE=Math.max(1,Math.min(20,ss));CYCLES=Math.max(1,Math.min(20,cy));LONG_EVERY=Math.max(1,Math.min(20,le));
    document.getElementById('inputSessionSize').value=SESSION_SIZE;document.getElementById('inputCycles').value=CYCLES;document.getElementById('inputLongEvery').value=LONG_EVERY;
    objDisp.textContent=obj;count=0;cycleIndex=0;phase='idle';timeLeft=WORK;running=false;
    sessionNotes=[];reflectionShown=false;noteSubmittedThisPomodoro=false;
    document.body.className='';pLabel.textContent='Ready';
    display.textContent=fmt(WORK);
    doneMsg.classList.remove('visible');summaryEl.classList.remove('visible');
    reflectionPanel.classList.remove('visible');warningLabel.classList.remove('visible');
    warningLabel.textContent='';noteSavedBadge.classList.remove('visible');
    renderControls('Start');buildDots();updateTitle();saveSettings();
  }
  function resetSettings(){
    document.getElementById('inputWork').value=25;
    document.getElementById('inputShort').value=5;
    document.getElementById('inputLong').value=15;
    document.getElementById('inputSessionSize').value=4;
    document.getElementById('inputLongEvery').value=4;
    document.getElementById('inputCycles').value=2;
    applySettings();
  }
  function saveSettings(){try{localStorage.setItem('pomodoro_settings',JSON.stringify({work:WORK,short:SHORT,long:LONG,sessionSize:SESSION_SIZE,cycles:CYCLES,longEvery:LONG_EVERY}));}catch(e){}}
  function loadSettings(){try{var s=JSON.parse(localStorage.getItem('pomodoro_settings'));if(!s)return;WORK=s.work||25*60;SHORT=s.short||5*60;LONG=(typeof s.long==='number')?s.long:15*60;SESSION_SIZE=(s.sessionSize!=null)?s.sessionSize:((s.total!=null)?s.total:4);CYCLES=(s.cycles!=null)?s.cycles:2;LONG_EVERY=s.longEvery||4;SESSION_SIZE=Math.max(1,Math.min(20,SESSION_SIZE));CYCLES=Math.max(1,Math.min(20,CYCLES));document.getElementById('inputWork').value=Math.round(WORK/60);document.getElementById('inputShort').value=Math.round(SHORT/60);document.getElementById('inputLong').value=Math.round(LONG/60);document.getElementById('inputSessionSize').value=SESSION_SIZE;document.getElementById('inputCycles').value=CYCLES;document.getElementById('inputLongEvery').value=LONG_EVERY;timeLeft=WORK;display.textContent=fmt(WORK);}catch(e){}}

  function toggleStart(){
    if(phase==='idle'){startWork();return;}if(phase==='done')return;
    if(running){clearInterval(interval);running=false;controls.querySelector('.primary').textContent='Resume';}
    else{running=true;controls.querySelector('.primary').textContent='Pause';interval=setInterval(tick,1000);}
  }
  function advanceAfterWorkBlock(){
    if(count>=SESSION_SIZE){
      if(cycleIndex+1<CYCLES){startCycleIntermission();}
      else{showDoneFinal();}
    }else{
      var isLong=(LONG>0)&&(count%LONG_EVERY===0);
      startBreak(isLong);
    }
  }
  function startCycleIntermission(){
    exitCompact();
    phase='cycleBreak';timeLeft=interCycleDuration();running=true;
    document.body.className='break';
    pLabel.textContent='Cycle break';
    display.textContent=fmt(timeLeft);
    doneMsg.textContent='Cycle '+(cycleIndex+1)+' complete — great work. Take a longer pause, then continue when you’re ready.';
    doneMsg.classList.add('visible');
    summarySectionTitle.textContent='Notes this cycle';
    var cycleNotes=sessionNotes.filter(function(n){return n.cycle===cycleIndex;});
    if(cycleNotes.length>0){renderSummaryHtml(cycleNotes);summaryEl.classList.add('visible');}
    else{summaryContent.innerHTML='';summaryEl.classList.remove('visible');}
    warningLabel.classList.remove('visible');warningLabel.textContent='';
    reflectionPanel.classList.remove('visible');noteSavedBadge.classList.remove('visible');
    settingsPanel.style.display='';renderControls('Pause');
    clearInterval(interval);interval=setInterval(tick,1000);updateTitle();
    requestPanelFitDone();
  }
  function finishCycleIntermission(){
    doneMsg.classList.remove('visible');summaryEl.classList.remove('visible');summaryContent.innerHTML='';
    count=0;cycleIndex++;playTransitionSound();startWork(true);
  }
  function startWork(skipSound){
    phase='work';timeLeft=WORK;running=true;warningShown=false;reflectionShown=false;noteSubmittedThisPomodoro=false;
    document.body.className='work';pLabel.textContent='Work';
    updateDots();display.textContent=fmt(timeLeft);
    warningLabel.classList.remove('visible');warningLabel.textContent='';
    reflectionPanel.classList.remove('visible');noteSavedBadge.classList.remove('visible');
    reflectionTitle.value='';reflectionText.value='';settingsPanel.style.display='';
    renderControls('Pause');clearInterval(interval);interval=setInterval(tick,1000);
    updateDots();updateTitle();if(!skipSound)playTransitionSound();requestNotifications();
    enterCompact();
  }
  function startBreak(isLong){
    exitCompact();
    phase=isLong?'longBreak':'shortBreak';timeLeft=isLong?LONG:SHORT;running=true;
    document.body.className='break';pLabel.textContent=isLong?'Long Break':'Short Break';
    display.textContent=fmt(timeLeft);warningLabel.classList.remove('visible');warningLabel.textContent='';
    reflectionPanel.classList.remove('visible');noteSavedBadge.classList.remove('visible');
    settingsPanel.style.display='';renderControls('Pause');
    clearInterval(interval);interval=setInterval(tick,1000);updateTitle();
  }
  function showReflectionPanel(){
    reflectionShown=true;reflectionTitle.value='';reflectionText.value='';
    noteSavedBadge.classList.remove('visible');
    settingsPanel.style.display='none';
    reflectionPanel.classList.add('visible');reflectionTitle.focus();
  }
  function submitReflection(){
    var title=reflectionTitle.value.trim(),text=reflectionText.value.trim();
    if(!text&&!title){showNoteStatus('Write something first');return;}
    if(noteSubmittedThisPomodoro){
      for(var i=sessionNotes.length-1;i>=0;i--){if(noteKeyMatches(sessionNotes[i])){sessionNotes[i].title=title;sessionNotes[i].text=text;sessionNotes[i].time=formatTime();break;}}
      showNoteStatus('Note updated');
    }else{
      sessionNotes.push({workIndex:count+1,cycle:cycleIndex,title:title,text:text,time:formatTime()});
      noteSubmittedThisPomodoro=true;showNoteStatus('Note saved');
    }
    noteSavedBadge.classList.add('visible');
  }
  function autoSaveReflection(){
    var title=reflectionTitle.value.trim(),text=reflectionText.value.trim();
    if((text||title)&&!noteSubmittedThisPomodoro){
      sessionNotes.push({workIndex:count+1,cycle:cycleIndex,title:title,text:text,time:formatTime()});noteSubmittedThisPomodoro=true;
    }else if((text||title)&&noteSubmittedThisPomodoro){
      for(var i=sessionNotes.length-1;i>=0;i--){if(noteKeyMatches(sessionNotes[i])){sessionNotes[i].title=title;sessionNotes[i].text=text;sessionNotes[i].time=formatTime();break;}}
    }
  }
  function tick(){
    timeLeft--;display.textContent=fmt(timeLeft);updateTitle();
    if(phase==='work'&&timeLeft===120&&!reflectionShown){
      expandFull();
      playWarningSound();display.classList.add('pulse');
      warningLabel.textContent='2 min — reflect';warningLabel.classList.add('visible');
      notify('Pomodoro Timer','2 minutes left — time to reflect');
      setTimeout(function(){display.classList.remove('pulse');},2000);
      showReflectionPanel();
    }
    if(timeLeft>0)return;clearInterval(interval);running=false;
    if(phase==='work'){
      autoSaveReflection();reflectionPanel.classList.remove('visible');
      warningLabel.classList.remove('visible');warningLabel.textContent='';
      count++;updateDots();playSessionEndSound();
      notifyWorkBlockDone();
      advanceAfterWorkBlock();
    }else if(phase==='cycleBreak'){
      var autoCy=localStorage.getItem('autoStartAfterBreak')==='1';
      notify('Cycle break over',autoCy?('Starting cycle '+(cycleIndex+2)+'\u2026'):'Press Start when you\'re ready for the next cycle.');
      var autoStart=autoCy;
      if(autoStart){finishCycleIntermission();}
      else{playTransitionSound();count=0;cycleIndex++;phase='idle';timeLeft=WORK;document.body.className='';pLabel.textContent='Ready';
        doneMsg.classList.remove('visible');summaryEl.classList.remove('visible');summaryContent.innerHTML='';
        updateDots();display.textContent=fmt(WORK);renderControls('Start');updateTitle();}
    }else{
      notify('Break Over','Ready for the next pomodoro?');
      var autoStart=localStorage.getItem('autoStartAfterBreak')==='1';
      if(autoStart){playTransitionSound();startWork(true);}
      else{playTransitionSound();phase='idle';timeLeft=WORK;document.body.className='';pLabel.textContent='Ready';
      updateDots();
      display.textContent=fmt(WORK);renderControls('Start');updateTitle();}
    }
  }
  function resetBlock(){
    clearInterval(interval);running=false;reflectionPanel.classList.remove('visible');
    noteSavedBadge.classList.remove('visible');warningLabel.classList.remove('visible');
    warningLabel.textContent='';reflectionShown=false;noteSubmittedThisPomodoro=false;
    if(phase==='shortBreak')timeLeft=SHORT;else if(phase==='longBreak')timeLeft=LONG;else if(phase==='cycleBreak')timeLeft=interCycleDuration();else timeLeft=WORK;
    display.textContent=fmt(timeLeft);renderControls('Start');updateTitle();
  }
  function skipPhase(){
    clearInterval(interval);running=false;
    if(phase==='work'){autoSaveReflection();reflectionPanel.classList.remove('visible');warningLabel.classList.remove('visible');count++;updateDots();playSessionEndSound();notifyWorkBlockDone();advanceAfterWorkBlock();}
    else if(phase==='cycleBreak'){finishCycleIntermission();}
    else if(phase==='shortBreak'||phase==='longBreak'){exitCompact();phase='idle';timeLeft=WORK;document.body.className='';pLabel.textContent='Ready';updateDots();display.textContent=fmt(WORK);renderControls('Start');updateTitle();}
    else startWork();
  }
  function showDoneFinal(){
    exitCompact();
    phase='done';document.body.className='done';pLabel.textContent='Done';display.textContent='00:00';
    doneMsg.textContent='All cycles complete — outstanding focus. Here’s everything you captured.';
    doneMsg.classList.add('visible');reflectionPanel.classList.remove('visible');settingsPanel.style.display='';
    summarySectionTitle.textContent='All notes';
    if(sessionNotes.length>0){renderSummaryHtml(sessionNotes);summaryEl.classList.add('visible');}
    else{summaryContent.innerHTML='';summaryEl.classList.remove('visible');}
    controls.innerHTML='<button class="primary" onclick="copyAllNotes()">Copy All</button><button class="secondary" onclick="restart()">Again</button>';
    updateTitle();
    notify('All complete!',''+CYCLES+' cycle'+(CYCLES!==1?'s':'')+' ('+SESSION_SIZE+' sessions each) finished.');
    requestPanelFitDone();
  }
  function restart(){
    exitCompact();
    count=0;cycleIndex=0;phase='idle';timeLeft=WORK;running=false;sessionNotes=[];warningShown=false;
    reflectionShown=false;noteSubmittedThisPomodoro=false;document.body.className='';
    pLabel.textContent='Ready';    display.textContent=fmt(WORK);doneMsg.classList.remove('visible');summaryEl.classList.remove('visible');
    reflectionPanel.classList.remove('visible');warningLabel.classList.remove('visible');
    warningLabel.textContent='';noteSavedBadge.classList.remove('visible');
    renderControls('Start');buildDots();updateTitle();
  }
  function renderControls(l){controls.innerHTML='<button class="primary" onclick="toggleStart()">'+l+'</button><button class="secondary" onclick="resetBlock()">Reset</button><button class="secondary" onclick="skipPhase()">Skip</button>';}

  function escapeHtml(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
  function getObjective(){return document.getElementById('inputObjective').value.trim()||'No objective set';}
  function generateSingleMarkdown(n){
    var h=n.title||('Session '+n.workIndex);
    var cyc=(n.cycle!=null)?('\n**Cycle:** '+(n.cycle+1)):'';
    return'## '+h+' — '+formatDate()+' '+n.time+'\n**Objective:** '+getObjective()+cyc+'\n\n'+n.text+'\n';
  }
  function generateAllMarkdown(){
    var wmin=Math.round(WORK/60),totalWorkMin=SESSION_SIZE*CYCLES*wmin;
    var md='# Pomodoro run — '+formatDate()+'\n**Objective:** '+getObjective()+'\n**Plan:** '+CYCLES+' cycle'+(CYCLES!==1?'s':'')+' × '+SESSION_SIZE+' sessions × '+wmin+' min ('+totalWorkMin+' min work)\n\n';
    sessionNotes.forEach(function(n){var h=n.title||('Session '+n.workIndex);md+='### '+h+' — cycle '+(n.cycle+1)+' ('+n.time+')\n'+n.text+'\n\n';});
    return md.trim()+'\n';
  }
  function copyCurrentNote(){
    var title=reflectionTitle.value.trim(),text=reflectionText.value.trim();
    if(!text){showNoteStatus('Nothing to copy');return;}
    var md=generateSingleMarkdown({workIndex:count+1,cycle:cycleIndex,title:title,text:text,time:formatTime()});
    navigator.clipboard.writeText(md).then(function(){showNoteStatus('Copied');}).catch(function(){showNoteStatus('Could not copy');});
  }
  function copyAllNotes(){
    if(sessionNotes.length===0)return;
    navigator.clipboard.writeText(generateAllMarkdown()).then(function(){var b=controls.querySelector('.primary');if(b){b.textContent='Copied';setTimeout(function(){b.textContent='Copy All';},2000);}}).catch(function(){});
  }
  function showNoteStatus(m){notesStatus.textContent=m;notesStatus.classList.add('visible');setTimeout(function(){notesStatus.classList.remove('visible');},2500);}

  function toggleMute(){muted=!muted;document.getElementById('muteBtn').textContent=muted?'Sound Off':'Sound On';try{localStorage.setItem('pomodoro_muted',muted?'1':'0');}catch(e){}}
  function loadMute(){try{muted=localStorage.getItem('pomodoro_muted')==='1';document.getElementById('muteBtn').textContent=muted?'Sound Off':'Sound On';}catch(e){}}
  function toggleFunnyMode(){funnyMode=!funnyMode;var b=document.getElementById('funnyBtn');b.textContent=funnyMode?'Funny On':'Funny Mode';b.classList.toggle('active',funnyMode);try{localStorage.setItem('pomodoro_funny',funnyMode?'1':'0');}catch(e){}}
  function loadFunnyMode(){try{funnyMode=localStorage.getItem('pomodoro_funny')==='1';var b=document.getElementById('funnyBtn');b.textContent=funnyMode?'Funny On':'Funny Mode';b.classList.toggle('active',funnyMode);}catch(e){}}

  document.addEventListener('keydown',function(e){if(e.metaKey&&e.key==='Enter'){e.preventDefault();toggleStart();return;}if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.code==='Space'){e.preventDefault();toggleStart();}else if(e.key==='r'||e.key==='R')resetBlock();else if(e.key==='s'||e.key==='S')skipPhase();});

  // Update checker
  var APP_VERSION='0.3.4';
  var GITHUB_REPO='akasatrio/reflection-pomodoro-timer';
  function compareVersions(a,b){
    var pa=a.replace(/^v/,'').split('.').map(Number),pb=b.replace(/^v/,'').split('.').map(Number);
    for(var i=0;i<3;i++){if((pa[i]||0)>(pb[i]||0))return 1;if((pa[i]||0)<(pb[i]||0))return -1;}return 0;
  }
  function checkForUpdate(){
    fetch('https://api.github.com/repos/'+GITHUB_REPO+'/releases/latest')
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.tag_name&&compareVersions(data.tag_name,APP_VERSION)>0){
          var banner=document.getElementById('updateBanner');
          document.getElementById('updateVersion').textContent=data.tag_name;
          banner.classList.add('visible');
        }
      }).catch(function(){});
  }
  function applyUpdate(){
    var banner=document.getElementById('updateBanner');
    banner.classList.add('updating');
    banner.textContent='Downloading and building update\u2026';
    panelMsg('updateApp');
  }
  function updateFailed(msg){
    var banner=document.getElementById('updateBanner');
    banner.classList.remove('updating');
    banner.innerHTML='Update failed — click to retry';
    banner.onclick=function(){checkForUpdate();applyUpdate();};
    setTimeout(function(){
      banner.innerHTML='&#x2191; Update available (<span id="updateVersion"></span>) — Restart to update';
      banner.onclick=function(){applyUpdate();};
      checkForUpdate();
    },5000);
  }
  checkForUpdate();
  setInterval(checkForUpdate,30*60*1000);

  loadSettings();loadMute();loadFunnyMode();buildDots();display.textContent=fmt(WORK);updateTitle();
</script>
</body>
</html>
